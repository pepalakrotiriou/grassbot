<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Σελίδα Χρήστη Grassbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #2d5a27; /* Πράσινο του γρασιδιού */
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        #logo { width: 150px; border-radius: 50%; margin-bottom: 10px; }
        h1 { margin-bottom: 5px; }
        h2 { color: #a8e6cf; margin-top: 0; font-weight: 300; }
        
        #image-display { 
            width: 100%; 
            max-width: 400px; 
            height: auto; 
            border-radius: 10px; 
            margin: 20px 0;
            border: 3px solid white;
        }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button, label { 
            padding: 12px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-pi { background: #3b82f6; color: white; }
        .btn-upload { background: #ffffff; color: #2d5a27; }
        .btn-spray { background: #ef4444; color: white; width: 100%; margin-top: 15px; }
        button:hover { transform: scale(1.05); opacity: 0.9; }

        #result-box {
            font-size: 24px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" id="logo" alt="Grassbot Logo">
        <h1>GRASSBOT SOLUTIONS</h1>
        <h2>ΣΕΛΙΔΑ ΧΡΗΣΤΗ</h2>

        <div id="result-box">Αναμονή για εικόνα...</div>

        <img id="image-display" src="https://via.placeholder.com/400x300?text=Upload+or+Capture" />

        <div class="controls">
            <button class="btn-pi" onclick="captureFromPi()">Λήψη από Pi 4</button>
            
            <input type="file" id="file-input" accept="image/*" style="display:none">
            <label for="file-input" class="btn-upload">Ανέβασμα Αρχείου</label>
            
            <button class="btn-spray" onclick="activatePump()">ΕΝΕΡΓΟΠΟΙΗΣΗ ΨΕΚΑΣΜΟΥ</button>
        </div>
    </div>

    <script>
        // Το δικό σου μοντέλο Teachable Machine
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/c6m5BlOJg/";
        // Η IP του Raspberry Pi σου
        const PI_IP = "http://192.168.1.XX:5000"; 

        let model, maxPredictions;

        // Φόρτωση του μοντέλου κατά την εκκίνηση
        async function init() {
            const modelURL = MODEL_URL + "model.json";
            const metadataURL = MODEL_URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            console.log("Model Loaded");
        }

        // Λήψη από το Raspberry Pi
        async function captureFromPi() {
            const img = document.getElementById("image-display");
            img.src = PI_IP + "/capture?t=" + new Date().getTime();
            img.onload = () => predict();
        }

        // Ανέβασμα αρχείου από τον υπολογιστή
        document.getElementById('file-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById("image-display");
                img.src = reader.result;
                img.onload = () => predict();
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Διάγνωση
        async function predict() {
            const img = document.getElementById("image-display");
            const prediction = await model.predict(img);
            
            let bestMatch = "";
            let highestProb = 0;

            prediction.forEach(p => {
                if(p.probability > highestProb) {
                    highestProb = p.probability;
                    bestMatch = p.className;
                }
            });

            document.getElementById("result-box").innerHTML = 
                `Διάγνωση: <span style="color:#fcd34d">${bestMatch}</span> (${(highestProb * 100).toFixed(0)}%)`;
        }

        async function activatePump() {
            try {
                await fetch(PI_IP + "/spray", { method: 'POST' });
                alert("Ο ψεκασμός ξεκίνησε!");
            } catch (err) {
                alert("Σφάλμα σύνδεσης με το Raspberry Pi");
            }
        }

        init();
    </script>
</body>
</html>
