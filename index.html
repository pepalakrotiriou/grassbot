<style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #2d5a27; 
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* Διόρθωση Logo για να μην παραμορφώνεται */
        #logo { 
            width: 150px; 
            height: 150px;
            object-fit: contain; /* Διατηρεί τις αναλογίες του logo */
            background: white;   /* Προσθέτει λευκό φόντο αν το logo είναι διάφανο */
            border-radius: 50%; 
            margin-bottom: 15px;
            border: 4px solid #fff;
        }
        h1 { font-size: 22px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Διόρθωση πλαισίου εικόνας για να μην φαίνεται σαν γραμμή */
        #image-display { 
            width: 100%; 
            max-width: 400px; 
            min-height: 250px; /* Δίνει ύψος ακόμα και αν δεν έχει φορτώσει η φωτό */
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0;
            border: 3px solid white;
            background-color: rgba(0,0,0,0.2);
            object-fit: cover;
        }

        #result-box {
            font-size: 20px;
            margin: 10px 0;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            border-left: 5px solid #a8e6cf;
        }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        
        button, label { 
            padding: 12px 18px; 
            font-size: 14px; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            transition: 0.2s;
            font-weight: bold;
            display: inline-block;
        }
        .btn-pi { background: #3b82f6; color: white; }
        .btn-upload { background: #ffffff; color: #2d5a27; }
        .btn-spray { background: #ef4444; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
